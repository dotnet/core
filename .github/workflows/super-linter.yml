---
# This workflow executes several linters on changed files based on languages
# used in your code base whenever you push code or open a pull request.
#
# You can adjust the behavior by modifying this file.
# For more information, see:
# https://github.com/github/super-linter
name: Lint Code Base

# yamllint disable rule:truthy
on:
  push:
    branches: [main]
  pull_request:
    branches: "**"
# yamllint enable rule:truthy

permissions:
  contents: read
  packages: read
  statuses: write

jobs:
  run-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          # Full git history is needed to get a proper list of changed files
          # within `super-linter`.
          fetch-depth: 0

      - name: Lint Code Base
        # github/super-linter v7
        uses: github/super-linter@b807e99ddd37e444d189cfd2c2ca1274d8ae8ef1
        env:
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_JSCPD: false
          VALIDATE_NATURAL_LANGUAGE: false
          VALIDATE_MARKDOWN_PRETTIER: false
          VALIDATE_JSON_PRETTIER: false
          # Exclude GitHub skills and generated workflows
          # yamllint disable rule:line-length
          FILTER_REGEX_EXCLUDE: (.github/skills/.*|.github/workflows/copilot-setup-steps\.yml|.github/workflows/.*\.lock\.yml)
          # yamllint enable rule:line-length
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
